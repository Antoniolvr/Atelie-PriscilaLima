<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ateliê Priscila Lima — Crochê Artesanal</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Lora:wght@400;500&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#FAF1F2;
  --rose:#C89A9E;
  --rose-dark:#A9787D;
  --brown:#4D3537;
  --brown-mid:#7A5A5D;
  --white:#FFFDFD;
}

body{
  font-family:'Lora', serif;
  background:linear-gradient(180deg,#FAF1F2 0%,#F7ECEE 100%);
  color:var(--brown);
}

/* NAV */
nav{
  position:sticky;
  top:0;
  background:rgba(255,255,255,.9);
  backdrop-filter:blur(10px);
}

.nav-container{
  max-width:1200px;
  margin:auto;
  padding:1rem 2rem;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.main-logo{
  height:50px;
}

/* HERO PREMIUM */
.hero{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:7rem 2rem;
  text-align:center;
  background:
    radial-gradient(circle at 20% 20%, rgba(200,154,158,.2), transparent 40%),
    linear-gradient(180deg,#FAF1F2,#F7EBEC);
}

.hero-content{
  width:100%;
  max-width:1200px;
}

/* NOVA FAIXA PREMIUM */
.hero-brand{
  width:100%;
  padding:2rem;
  border-radius:30px;
  background:rgba(255,255,255,.6);
  backdrop-filter:blur(12px);
  box-shadow:0 20px 50px rgba(0,0,0,.08);
  margin-bottom:2rem;
}

.hero-brand img{
  width:100%;
  max-width:100%;
  object-fit:contain;
}

/* TEXTO */
.hero-tag{
  font-size:.75rem;
  letter-spacing:.3em;
  color:var(--rose-dark);
  margin-bottom:1rem;
}

.hero h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(2.5rem,6vw,5rem);
  margin-bottom:1rem;
}

.hero h1 em{
  color:var(--rose-dark);
}

.hero-desc{
  max-width:700px;
  margin:auto;
  line-height:1.8;
  color:var(--brown-mid);
}

/* BOTÕES */
.hero-actions{
  margin-top:2rem;
  display:flex;
  gap:1rem;
  justify-content:center;
}

.hero-cta{
  padding:1rem 2rem;
  border-radius:999px;
  background:linear-gradient(135deg,var(--rose),var(--rose-dark));
  color:#fff;
  text-decoration:none;
}

.hero-cta-outline{
  border:1px solid var(--rose-dark);
  color:var(--rose-dark);
  background:none;
}

/* MOBILE */
@media(max-width:720px){
  .hero{
    padding:5rem 1rem;
  }

  .hero-brand{
    padding:1.2rem;
  }

  .hero h1{
    font-size:2.2rem;
  }
}
</style>
</head>

<body>

<nav>
  <div class="nav-container">
    <img src="/logo.jpg" class="main-logo">

    <div>
      Produtos | Sobre | Contato
    </div>
  </div>
</nav>

<section class="hero">
  <div class="hero-content">

    <!-- LOGO FULL WIDTH -->
    <div class="hero-brand">
      <img src="/logo.jpg" alt="Priscila Lima Crochê">
    </div>

    <span class="hero-tag">✦ CROCHÊ ARTESANAL ✦</span>

    <h1>Peças feitas à mão para <em>encantar</em></h1>

    <p class="hero-desc">
      Cada peça é criada com carinho, trazendo delicadeza, elegância e exclusividade para o seu lar.
    </p>

    <div class="hero-actions">
      <a href="#" class="hero-cta">Ver coleção</a>
      <a href="#" class="hero-cta hero-cta-outline">Sobre a marca</a>
    </div>

  </div>
</section>

</body>
</html>
