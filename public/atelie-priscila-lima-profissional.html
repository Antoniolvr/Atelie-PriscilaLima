<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ateliê Priscila Lima — Loja Oficial</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lora:wght@400;500&display=swap" rel="stylesheet">

<style>
body{font-family:'Lora',serif;margin:0;background:#FAF1F2;color:#4D3537}

/* HERO */
.hero{text-align:center;padding:80px 20px}
.hero img{width:100%;max-width:900px}
.hero h1{font-family:'Playfair Display',serif;font-size:42px;margin-top:20px}
.hero p{max-width:600px;margin:10px auto;color:#7A5A5D}

/* BOTÕES */
.btn{padding:14px 28px;border-radius:30px;text-decoration:none;display:inline-block;margin:10px}
.btn-primary{background:#C89A9E;color:#fff}
.btn-outline{border:2px solid #C89A9E;color:#C89A9E}

/* TRUST */
.trust{display:flex;justify-content:center;gap:15px;margin:30px;flex-wrap:wrap}
.trust div{background:#fff;padding:12px 18px;border-radius:10px}

/* PRODUTOS */
.products{padding:40px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.card{background:#fff;padding:20px;border-radius:15px;text-align:center}
.price{font-weight:bold;margin:10px 0}

/* WHATS */
.whatsapp{position:fixed;bottom:20px;right:20px;background:#25D366;color:#fff;
width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;
font-size:24px;text-decoration:none}

/* TESTIMONIAL */
.testimonials{padding:40px;text-align:center}
.testimonials div{background:#fff;margin:10px;padding:15px;border-radius:10px}

/* RESPONSIVO */
@media(max-width:600px){
.hero h1{font-size:28px}
}
</style>
</head>

<body>

<section class="hero">
<img src="/logo.jpg">
<h1>Transforme sua casa com crochê artesanal</h1>
<p>Peças exclusivas feitas à mão com delicadeza e elegância</p>

<a href="#produtos" class="btn btn-primary">Comprar Agora</a>
<a href="https://wa.me/5581999999999" class="btn btn-outline">WhatsApp</a>
</section>

<div class="trust">
<div>💳 Pagamento seguro</div>
<div>🚚 Entrega nacional</div>
<div>🧶 Feito à mão</div>
</div>

<section id="produtos" class="products">
<h2 style="text-align:center">Produtos</h2>

<div class="grid">
<div class="card">
<h3>Sousplat</h3>
<p class="price">R$ 25,00</p>
<a href="https://wa.me/5581999999999?text=Quero%20Sousplat" class="btn btn-primary">Comprar</a>
</div>
</div>

</section>

<section class="testimonials">
<h2>Clientes satisfeitas</h2>
<div>"Muito lindo!" — Maria</div>
<div>"Qualidade incrível!" — Ana</div>
</section>

<a href="https://wa.me/5581999999999" class="whatsapp">💬</a>

</body>
</html>
